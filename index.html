<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程品質管制系統 V5.0 - 混凝土強度管制圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @media print {
            @page { size: A4 portrait; margin: 1cm; }
            body { font-size: 10pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-before: always; }
            /* 修正匯出邊界問題：增加 max-width 與 overflow 限制 */
            #chart-container { width: 100% !important; max-width: 100% !important; height: auto !important; max-height: 400px; overflow: hidden; }
        }
        body { font-family: 'Helvetica Neue', '微軟正黑體', sans-serif; background-color: #f4f6f9; }
        .data-table th, .data-table td { border: 1px solid #cbd5e1; padding: 6px; text-align: center; }
        .data-table th { background-color: #e2e8f0; font-weight: bold; }
        .val-xa { color: #d97706; font-weight: bold; } 
        .val-3avg { color: #db2777; font-weight: bold; } 
        .val-r5 { color: #16a34a; font-weight: bold; } 
        .header-bg { background-color: #1e3a8a; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 max-w-7xl mx-auto">

    <div class="header-bg text-white p-4 rounded-t-lg shadow-md flex justify-between items-center print:bg-white print:text-black print:border-b-2 print:border-gray-800">
        <div>
            <h1 class="text-2xl font-bold">工程品質管制系統 V5.0</h1>
            <p class="text-sm opacity-80 print:text-black">混凝土強度管制網頁版 (R5 差距變動平均法)</p>
        </div>
        <div class="no-print flex items-center space-x-3">
            <div id="init-loading" class="hidden flex items-center bg-blue-800 px-4 py-2 rounded text-sm font-bold">
                <div class="loader" style="width: 16px; height: 16px; border-width: 2px;"></div>
                <span class="ml-2">同步雲端試驗庫中...</span>
            </div>
            <button onclick="window.open('https://script.google.com/macros/s/AKfycbwku-9yEZkhHCzdoKlyF_G5TRq24z5zsQcM80afPbVP8i1Ig9WU3bWStEAD1OvD9My-Kg/exec', '_blank')" class="bg-green-600 text-white px-4 py-2 rounded shadow font-bold hover:bg-green-700 transition">
                前往材料檢試驗紀錄
            </button>
            <button onclick="exportToPDF()" class="bg-white text-blue-900 px-4 py-2 rounded shadow font-bold hover:bg-blue-50 transition">
                匯出 A4 管制圖 (PDF)
            </button>
        </div>
    </div>

    <div class="bg-white p-6 shadow-md rounded-b-lg border border-t-0 border-gray-200">
        
        <!-- 全新圖表智慧控制面板 -->
        <div class="no-print mb-8 p-6 bg-gray-50 rounded-xl border-2 border-gray-200 shadow-sm">
            <div class="flex flex-col md:flex-row gap-8 items-end">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-gray-700 mb-2 tracking-wide">專案名稱選擇</label>
                    <select id="projName" onchange="projChanged()" class="w-full border-2 border-gray-300 p-3 rounded-xl font-bold bg-white focus:ring-2 focus:ring-blue-500 outline-none"></select>
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm font-bold text-gray-700 mb-2 tracking-wide">篩選設計強度 (fc')</label>
                    <select id="fc" onchange="fcChanged()" class="w-full border-2 border-blue-300 p-3 rounded-xl font-bold bg-blue-50 text-blue-900 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm font-bold text-gray-700 mb-2 tracking-wide">設定配比強度 (fcr')</label>
                    <input type="number" id="fcr" value="365" onchange="updateUI()" class="w-full border-2 border-gray-300 p-3 rounded-xl font-bold bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div id="bug-warning" class="hidden mt-6 p-4 bg-yellow-100 text-yellow-800 border-2 border-yellow-300 rounded-xl font-bold">
                ⚠️ 提示：目前該強度試體組數不足 5 組，系統將於組數達標後自動產出 R5 差距變動平均值。
            </div>
        </div>

        <div class="text-center mb-6 mt-4">
            <h2 class="text-xl font-bold italic border-b-2 border-gray-800 inline-block pb-2 mb-3">工程名稱：<span id="display-proj" class="text-blue-800"></span></h2>
            <h3 class="text-lg tracking-widest font-black text-gray-700">混凝土強度管制圖 <span id="display-fc" class="text-sm text-gray-500 font-bold ml-2"></span></h3>
        </div>

        <div id="chart-container" class="mb-10 w-full h-[500px]"><canvas id="controlChart"></canvas></div>

        <div class="overflow-x-auto rounded-xl border border-gray-300 shadow-sm">
            <table class="w-full data-table text-sm">
                <thead>
                    <tr>
                        <th rowspan="2" class="py-3">編號</th><th rowspan="2">結構部位</th><th rowspan="2">取樣日期</th><th rowspan="2">試體編號</th>
                        <th colspan="3" class="bg-gray-200">抗壓強度(kg/cm²)</th><th class="bg-blue-50">平均強度</th><th class="bg-pink-50">強度變動平均值</th><th class="bg-gray-200">全距</th><th class="bg-green-50">差距變動平均值</th><th rowspan="2" colspan="2">破壞型態</th>
                    </tr>
                    <tr><th class="bg-gray-100">X1</th><th class="bg-gray-100">X2</th><th class="bg-gray-100">X3</th><th class="bg-blue-100">Xa</th><th class="bg-pink-100">∑(3 Xa)/3</th><th class="bg-gray-100">R</th><th class="bg-green-100">R5</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw9jyuXvYtc844ZX3zKboOHrkb9KXpXYOc4G6XWVTf9xyCoK4FpBMl6jkFFtdFPuNqb/exec"; 
        let records = []; 
        let projects = [];
        let chartInstance = null;

        async function fetchInitialData() {
            document.getElementById('init-loading').classList.remove('hidden');
            try {
                let response = await fetch(GAS_WEB_APP_URL);
                let data = await response.json();
                if (data && data.length > 0) {
                    records = data;
                    projects = [...new Set(records.map(r => r.projName))];
                }
            } catch (error) { console.error("載入失敗", error); }
            finally { 
                document.getElementById('init-loading').classList.add('hidden'); 
                loadProjects(); 
            }
        }

        function loadProjects() {
            const select = document.getElementById('projName');
            select.innerHTML = '';
            projects.forEach(p => {
                let opt = document.createElement('option'); opt.value = p; opt.innerText = p; select.appendChild(opt);
            });
            projChanged(); 
        }

        function projChanged() {
            let currentProj = document.getElementById('projName').value;
            let projRecords = records.filter(r => r.projName === currentProj);
            
            let fcs = [...new Set(projRecords.map(r => r.fc))].filter(fc => fc >= 210).sort((a,b) => b-a);
            
            const fcSelect = document.getElementById('fc');
            fcSelect.innerHTML = '';
            
            if(fcs.length === 0) {
                fcSelect.appendChild(new Option("無結構數據", "0"));
            } else {
                fcs.forEach(f => fcSelect.appendChild(new Option(f + " kgf/cm²", f)));
            }
            
            fcChanged();
        }

        function fcChanged() {
            let currentFc = parseInt(document.getElementById('fc').value) || 0;
            if(currentFc > 0) {
                document.getElementById('fcr').value = currentFc + 85;
            }
            updateUI();
        }

        function processData() {
            let currentProj = document.getElementById('projName').value;
            let currentFc = parseInt(document.getElementById('fc').value) || 0;
            
            let filteredRecords = records.filter(r => r.projName === currentProj && r.fc === currentFc);
            filteredRecords.sort((a, b) => new Date(a.date) - new Date(b.date));

            let processed = [];
            
            for (let i = 0; i < filteredRecords.length; i++) {
                let rec = filteredRecords[i];
                let xa = Math.round((rec.x1 + rec.x2 + rec.x3) / 3);
                let r = Math.max(rec.x1, rec.x2, rec.x3) - Math.min(rec.x1, rec.x2, rec.x3);
                
                let avg3 = "";
                if (i >= 2) {
                    let prev1 = Math.round((filteredRecords[i-1].x1 + filteredRecords[i-1].x2 + filteredRecords[i-1].x3) / 3);
                    let prev2 = Math.round((filteredRecords[i-2].x1 + filteredRecords[i-2].x2 + filteredRecords[i-2].x3) / 3);
                    avg3 = Math.round((xa + prev1 + prev2) / 3);
                }

                let r5 = "";
                if (i >= 4) {
                    let rSum = r;
                    for (let j = 1; j <= 4; j++) {
                        let prevRec = filteredRecords[i-j];
                        rSum += (Math.max(prevRec.x1, prevRec.x2, prevRec.x3) - Math.min(prevRec.x1, prevRec.x2, prevRec.x3));
                    }
                    r5 = Math.round(rSum / 5);
                }

                processed.push({ ...rec, displayId: i + 1, xa, avg3, r, r5 });
            }
            
            if(processed.length > 0 && processed.length < 5) {
                document.getElementById('bug-warning').classList.remove('hidden');
            } else {
                document.getElementById('bug-warning').classList.add('hidden');
            }
            
            return processed;
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            for (let i = 0; i < Math.max(data.length, 12); i++) {
                if (i < data.length) {
                    let d = data[i];
                    let dateObj = new Date(d.date);
                    let yyyy = dateObj.getFullYear();
                    let mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                    let dd = String(dateObj.getDate()).padStart(2, '0');
                    let cleanDate = yyyy + '/' + mm + '/' + dd; 
                    tbody.innerHTML += `<tr class="hover:bg-gray-50 transition">
                        <td class="font-bold text-gray-700">${d.displayId}</td><td class="font-bold">${d.part}</td><td>${cleanDate}</td><td>${d.specimen}</td>
                        <td class="bg-gray-50 font-mono">${d.x1}</td><td class="bg-gray-50 font-mono">${d.x2}</td><td class="bg-gray-50 font-mono">${d.x3}</td>
                        <td class="val-xa bg-blue-50/30 text-lg">${d.xa}</td>
                        <td class="val-3avg bg-pink-50/30 text-lg">${d.avg3}</td>
                        <td class="font-bold bg-gray-50">${d.r}</td>
                        <td class="val-r5 bg-green-50/30 text-lg">${d.r5}</td>
                        <td class="text-left font-bold text-gray-700">${d.failStr||''}</td>
                    </tr>`;
                } else {
                    tbody.innerHTML += `<tr><td class="text-gray-300">${i+1}</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
                }
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('controlChart').getContext('2d');
            let fc = parseInt(document.getElementById('fc').value) || 280;
            let fcr = parseInt(document.getElementById('fcr').value) || 365;
            let labels = data.length > 0 ? data.map(d => d.displayId) : [1,2,3,4,5];
            let xaData = data.map(d => d.xa);

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '平均強度 (Xa)', data: xaData, borderColor: '#3b82f6', backgroundColor: '#3b82f6', borderWidth: 3, pointRadius: 6, pointBackgroundColor: '#fff', fill: false },
                        { label: "fcr'", data: new Array(labels.length).fill(fcr), borderColor: '#84cc16', borderDash: [6, 6], borderWidth: 3, pointRadius: 0, fill: false },
                        { label: "fc'", data: new Array(labels.length).fill(fc), borderColor: '#ec4899', borderWidth: 3, pointRadius: 0, fill: false }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    // 修正匯出邊界問題：設定圖表邊界 Padding
                    layout: {
                        padding: { left: 10, right: 20 }
                    },
                    plugins: { legend: { labels: { font: { weight: 'bold', size: 14 } } } },
                    scales: { 
                        y: { 
                            beginAtZero: false,
                            min: Math.floor(fc / 15) * 15 - 15, 
                            ticks: { 
                                stepSize: 15, 
                                precision: 0,
                                autoSkip: false,
                                font: { weight: 'bold', size: 12 }
                            },
                            grid: { drawTicks: true, color: '#e5e7eb' }
                        },
                        x: {
                            // 修正匯出邊界問題：優化 X 軸標籤顯示
                            ticks: { 
                                font: { weight: 'bold', size: 12 },
                                autoSkip: true,
                                maxRotation: 0,
                                minRotation: 0
                            },
                            grid: { display: false }
                        }
                    } 
                }
            });
        }

        function updateUI() {
            let currentProj = document.getElementById('projName').value;
            let currentFc = document.getElementById('fc').value;
            
            document.getElementById('display-proj').innerText = currentProj || "未選擇專案";
            document.getElementById('display-fc').innerText = currentFc > 0 ? `(設計強度: ${currentFc} kgf/cm²)` : "";
            
            let processed = processData();
            renderTable(processed);
            renderChart(processed);
        }

        function exportToPDF() { window.print(); }
        
        // 程式啟動
        fetchInitialData(); 
    </script>
</body>
</html>
